services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: scholarsync-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@localhost:5432/postgres}
      - ENVIRONMENT=development
      - MAX_SCRAPING_THREADS=3
      - CORS_ORIGINS=["https://scholarsync.vercel.app", "http://localhost:3000"]
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - scholarsync-network

networks:
  scholarsync-network:
    driver: bridge 